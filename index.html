<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Crypto Demo</title>
<style>
body { margin:0; font-family:Arial,sans-serif; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh;}
.container { width:95%; max-width:400px; background:#1e293b; padding:20px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.5); text-align:center;}
input, select { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none;}
button { width:100%; padding:10px; margin-top:10px; border:none; border-radius:6px; background:#22c55e; color:white; font-weight:bold; cursor:pointer; transition:0.3s;}
button:hover { background:#16a34a;}
.hidden { display:none;}
canvas { background:#f0f0f0; border-radius:6px; margin-top:10px; display:block; width:100%;}
#rankingBox { margin-bottom:10px; background:#0f172a; padding:10px; border-radius:6px; text-align:left; max-height:100px; overflow-y:auto; font-size:14px;}
#jumpBtn { margin-top:10px; background:#3b82f6; }
#jumpBtn:hover { background:#2563eb; }
.info { font-size:13px; margin-top:5px; }
</style>
</head>
<body>
<div class="container">

<div id="registerScreen">
<h2>Registro</h2>
<input type="text" id="regUser" placeholder="Usuario">
<input type="password" id="regPass" placeholder="Contraseña">
<button onclick="register()">Crear Cuenta</button>
<p>¿Ya tienes cuenta?</p>
<button onclick="showLogin()">Iniciar Sesión</button>
</div>

<div id="loginScreen" class="hidden">
<h2>Iniciar Sesión</h2>
<input type="text" id="loginUser" placeholder="Usuario">
<input type="password" id="loginPass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>

<div id="panelScreen" class="hidden">
<h2>Panel del Juego</h2>
<p><strong>Intentos disponibles:</strong> <span id="attemptsDisplay">0</span></p>
<button onclick="simulatePayment()">Simular Pago (3 intentos)</button>
<button onclick="startIfAttempts()">Jugar</button>
</div>

<div id="gameScreen" class="hidden">
<div id="rankingBox"></div>
<h3>Tiempo restante: <span id="timer">60</span>s</h3>
<p class="info">Intentos restantes: <span id="attemptsGame"></span></p>
<canvas id="gameCanvas" width="320" height="150"></canvas>
<p id="scoreDisplay">Puntuación: 0</p>
<button id="jumpBtn" onclick="jump()">Saltar</button>
</div>

<div id="loseScreen" class="hidden">
<h2>Juego Finalizado</h2>
<button onclick="backToPanel()">Volver al Panel</button>
<button onclick="startIfAttempts()">Volver a Jugar</button>
</div>

<div id="rewardScreen" class="hidden">
<h2>¡Completaste el minuto!</h2>
<button onclick="backToPanel()">Volver al Panel</button>
<button onclick="startIfAttempts()">Volver a Jugar</button>
</div>

</div>

<script>
let currentUser=null;
let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

let player, obstacles, gravity, jumping, gameSpeed, score, timeLeft;
let gameInterval, timerInterval;

function register(){
  if(regUser.value && regPass.value){
    localStorage.setItem("user_"+regUser.value, regPass.value);
    localStorage.setItem("attempts_"+regUser.value, 0);
    alert("Cuenta creada.");
    showLogin();
  }
}

function showLogin(){ registerScreen.classList.add("hidden"); loginScreen.classList.remove("hidden"); }

function login(){
  if(localStorage.getItem("user_"+loginUser.value)===loginPass.value){
    currentUser=loginUser.value;
    loginScreen.classList.add("hidden");
    panelScreen.classList.remove("hidden");
    updateAttempts();
  } else alert("Credenciales incorrectas.");
}

function updateAttempts(){
  let attempts=localStorage.getItem("attempts_"+currentUser)||0;
  attemptsDisplay.innerText=attempts;
}

function simulatePayment(){
  let attempts=parseInt(localStorage.getItem("attempts_"+currentUser)||0);
  attempts+=3;
  localStorage.setItem("attempts_"+currentUser, attempts);
  updateAttempts();
  alert("Pago simulado: +3 intentos");
}

function startIfAttempts(){
  let attempts=parseInt(localStorage.getItem("attempts_"+currentUser)||0);
  if(attempts>0){
    attempts--;
    localStorage.setItem("attempts_"+currentUser, attempts);
    startGame();
  } else alert("No tienes intentos disponibles.");
}

function startGame(){
  panelScreen.classList.add("hidden");
  loseScreen.classList.add("hidden");
  rewardScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  attemptsGame.innerText=localStorage.getItem("attempts_"+currentUser);

  player={x:40,y:110,w:20,h:20,dy:0};
  obstacles=[];
  gravity=0.6;
  jumping=false;
  gameSpeed=3;
  score=0;
  timeLeft=60;

  timer.innerText=timeLeft;

  gameInterval=setInterval(updateGame,20);
  timerInterval=setInterval(()=>{
    timeLeft--;
    timer.innerText=timeLeft;
    if(timeLeft<=0) winGame();
  },1000);
}

function jump(){ if(!jumping){ player.dy=-10; jumping=true; } }

function updateGame(){
  ctx.clearRect(0,0,320,150);
  ctx.fillStyle="#000";
  ctx.fillRect(0,130,320,2);

  player.dy+=gravity;
  player.y+=player.dy;
  if(player.y>=110){ player.y=110; jumping=false; }

  ctx.fillRect(player.x,player.y,player.w,player.h);

  if(score%120===0){
    obstacles.push({x:320,y:110,w:15,h:20});
  }

  obstacles.forEach(o=>{
    o.x-=gameSpeed;
    ctx.fillRect(o.x,o.y,o.w,o.h);
    if(player.x<o.x+o.w && player.x+player.w>o.x && player.y<o.y+o.h && player.y+player.h>o.y){
      loseGame();
    }
  });

  obstacles=obstacles.filter(o=>o.x>-20);
  score++;
  scoreDisplay.innerText="Puntuación: "+score;

  if(score%600===0) gameSpeed+=0.5;
}

function loseGame(){
  clearInterval(gameInterval);
  clearInterval(timerInterval);
  saveScore();
  gameScreen.classList.add("hidden");
  loseScreen.classList.remove("hidden");
}

function winGame(){
  clearInterval(gameInterval);
  clearInterval(timerInterval);
  saveScore();
  gameScreen.classList.add("hidden");
  rewardScreen.classList.remove("hidden");
}

function saveScore(){
  let ranking=JSON.parse(localStorage.getItem("ranking"))||[];
  ranking.push({user:currentUser,score:score});
  ranking.sort((a,b)=>b.score-a.score);
  ranking=ranking.slice(0,5);
  localStorage.setItem("ranking",JSON.stringify(ranking));
  showRanking();
}

function showRanking(){
  let rankingBox=document.getElementById("rankingBox");
  let ranking=JSON.parse(localStorage.getItem("ranking"))||[];
  if(ranking.length===0){ rankingBox.innerHTML="Top 5: Ninguno aún"; return;}
  rankingBox.innerHTML="<strong>Top 5:</strong><br>";
  ranking.forEach((r,i)=>{
    rankingBox.innerHTML+=(i+1)+". "+r.user+" - "+r.score+"<br>";
  });
}

function backToPanel(){
  loseScreen.classList.add("hidden");
  rewardScreen.classList.add("hidden");
  panelScreen.classList.remove("hidden");
  updateAttempts();
}
</script>
</body>
  </html>
