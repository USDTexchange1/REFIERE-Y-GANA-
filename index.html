<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Arcade USDT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.container{
margin-top:30px;
width:95%;
max-width:420px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,229,255,0.3);
border:1px solid rgba(255,255,255,0.1);
}

.app-title{
text-align:center;
font-family:'Orbitron',sans-serif;
font-size:26px;
margin-bottom:10px;
color:#00e5ff;
text-shadow:0 0 10px #00e5ff;
}

h2{
text-align:center;
margin-bottom:15px;
font-family:'Orbitron',sans-serif;
}

input,select{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:500;
background:linear-gradient(135deg,#00e5ff,#0066ff);
color:white;
box-shadow:0 0 15px rgba(0,229,255,0.7);
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #00e5ff;
}

canvas{
display:block;
margin:auto;
margin-top:10px;
background:#e0f7fa;
border-radius:10px;
border:3px solid #00e5ff;
}

.hidden{
display:none;
}

.message{
text-align:center;
padding:8px;
margin-top:5px;
border-radius:8px;
}

.success{
background:#00c853;
}

.error{
background:#d50000;
}

.scrollable{
max-height:300px;
overflow-y:auto;
}

.stats{
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container" id="container">

<div class="app-title">🎮 MINI ARCADE USDT</div>

<div id="authPanel">

<input type="text" id="username" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">

<button id="registerBtn">Crear Cuenta</button>
<button id="loginBtn">Iniciar Sesión</button>

<div id="authMessage" class="message"></div>

</div>

<div id="paymentPanel" class="hidden">

<h2>Depositar 2 USDT</h2>

<input type="text" id="depositAddress" value="0x3670a0bFfb8b8A6D42177807F8dFd369A3995b9e" readonly>

<button id="copyAddress">Copiar Dirección</button>

<input type="text" id="txHash" placeholder="Ingrese Hash">

<button id="validateHash">Validar Hash</button>

<div id="hashMessage" class="message"></div>

<button id="accessGame" disabled>Acceder al Juego</button>
<button id="rulesBtn1">Reglas</button>
<button id="logout1">Cerrar Sesión</button>

</div>

<div id="gamePanel" class="hidden">

<h2>Mini Arcade</h2>

<canvas id="gameCanvas" width="360" height="200"></canvas>

<div class="stats">
Puntuación: <span id="score">0</span> |
Tiempo: <span id="timeLeft">60</span>s |
Intentos: <span id="attempts">3</span>
</div>

<button id="jumpBtn">Saltar</button>
<button id="restartGame">Volver a Jugar</button>
<button id="logout2">Cerrar Sesión</button>
<button id="rulesBtn2">Reglas</button>

<div id="gameMessage" class="message"></div>

</div>

<div id="rewardPanel" class="hidden">

<h2>Reclamar 10 USDT</h2>

<select id="networkSelect">
<option value="BEP20">BEP20</option>
<option value="TRC20">TRC20</option>
<option value="ERC20">ERC20</option>
</select>

<input type="text" id="walletAddress" placeholder="Dirección de Wallet">

<button id="sendReward">Enviar Recompensa</button>

<div id="rewardMessage" class="message"></div>

<button id="backPanel">Volver</button>

</div>

<div id="rulesPanel" class="hidden">

<h2>Reglas</h2>

<div class="scrollable">
<p>1. Salta obstáculos usando botón o barra espaciadora.</p>
<p>2. El juego dura 60 segundos.</p>
<p>3. Cada hash permite 3 intentos.</p>
<p>4. Tras 3 partidas debes ingresar otro hash.</p>
</div>

<button id="backFromRules">Volver</button>

</div>

<div id="rankingPanel">

<h2>Top Players</h2>

<ol id="rankingList"></ol>

</div>

</div>

<script>

let currentUser=null;
let users=JSON.parse(localStorage.getItem('users')||'{}');
let currentHashValid=false;
let attemptsLeft=3;
let gameInterval=null;
let gameTimer=null;
let timeLeft=60;
let score=0;
let obstacles=[];
let obstacleIndex=0;

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

let player={x:50,y:150,width:20,height:20,vy:0,jumping:false};

function showMessage(el,msg,type='success'){
el.textContent=msg;
el.className='message '+type;
setTimeout(()=>{el.textContent='';el.className='message'},4000);
}

function saveUsers(){
localStorage.setItem('users',JSON.stringify(users));
}

function updateRanking(){

const list=document.getElementById('rankingList');

list.innerHTML='';

let ranking=[];

Object.keys(users).forEach(u=>{
const max=Math.max(...(users[u].scores||[0]));
if(max>0) ranking.push({user:u,score:max});
});

ranking.sort((a,b)=>b.score-a.score);

ranking.slice(0,5).forEach(r=>{
let li=document.createElement('li');
li.textContent=r.user+" : "+r.score;
list.appendChild(li);
});

}

document.getElementById('registerBtn').onclick=()=>{

const u=username.value.trim();
const p=password.value.trim();

if(!u||!p){
showMessage(authMessage,"Campos vacíos","error");
return;
}

if(users[u]){
showMessage(authMessage,"Usuario ya existe","error");
return;
}

users[u]={password:p,hashes:[],scores:[]};

saveUsers();

showMessage(authMessage,"Registro exitoso");

};

document.getElementById('loginBtn').onclick=()=>{

const u=username.value.trim();
const p=password.value.trim();

if(!users[u]||users[u].password!==p){
showMessage(authMessage,"Datos incorrectos","error");
return;
}

currentUser=u;

authPanel.classList.add('hidden');
paymentPanel.classList.remove('hidden');

updateRanking();

};

document.getElementById('copyAddress').onclick=()=>{
navigator.clipboard.writeText(depositAddress.value);
showMessage(hashMessage,"Dirección copiada");
};

document.getElementById('validateHash').onclick=()=>{

const hash=txHash.value.trim();

if(!/^0x[a-fA-F0-9]{64}$/.test(hash)){
showMessage(hashMessage,"Hash inválido","error");
return;
}

currentHashValid=true;
attemptsLeft=3;
accessGame.disabled=false;

showMessage(hashMessage,"Hash válido");

};

document.getElementById('accessGame').onclick=()=>{

paymentPanel.classList.add('hidden');
gamePanel.classList.remove('hidden');

startGame();

};

function startGame(){

score=0;
timeLeft=60;

player.y=150;

document.getElementById('attempts').textContent=attemptsLeft;

gameInterval=setInterval(gameLoop,1000/60);

gameTimer=setInterval(()=>{

timeLeft--;

timeLeftEl=document.getElementById('timeLeft');
timeLeftEl.textContent=timeLeft;

if(timeLeft<=0){

clearInterval(gameInterval);
clearInterval(gameTimer);

winGame();

}

},1000);

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

player.vy+=1;

player.y+=player.vy;

if(player.y>150){

player.y=150;
player.vy=0;
player.jumping=false;

}

ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.width,player.height);

score+=0.1;

document.getElementById('score').textContent=Math.floor(score);

}

function jump(){

if(!player.jumping){

player.vy=-12;
player.jumping=true;

}

}

document.getElementById('jumpBtn').onclick=jump;

document.addEventListener('keydown',e=>{
if(e.code==="Space")jump();
});

function winGame(){

users[currentUser].scores.push(Math.floor(score));

saveUsers();

updateRanking();

gamePanel.classList.add('hidden');
rewardPanel.classList.remove('hidden');

}

</script>

</body>
  </html>
